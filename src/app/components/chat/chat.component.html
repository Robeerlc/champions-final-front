<div class="chat-wrapper">
  <div class="chat-header">
    <span class="chat-title">Chat</span>
    <span class="status-dot" [class.connected]="chatService.connected()"></span>
  </div>

  <div class="messages" #messagesContainer (scroll)="onScroll()">
    @if (chatService.messages().length === 0) {
      <p class="empty">No hay mensajes aún.</p>
    }
    @for (msg of chatService.messages(); track msg.id) {
      <div class="message" [class.mine]="msg.username === authService.getUsername()">
        <div class="bubble">
          <div class="meta">
            <span class="username">{{ msg.username }}</span>
            <span class="timestamp">{{ msg.timestamp | date:'HH:mm':'+0200' }}</span>
          </div>
          <p class="text">{{ msg.message }}</p>
        </div>
      </div>
    }
  </div>

  <div class="input-area">
    <textarea
      [(ngModel)]="newMessage"
      (keydown)="onKeydown($event)"
      placeholder="Escribe un mensaje... (Enter para enviar)"
      rows="2"
      [disabled]="!chatService.connected()"
    ></textarea>
    <button (click)="send()" [disabled]="!chatService.connected() || !newMessage.trim()">
      Enviar
    </button>
  </div>
</div>
